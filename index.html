<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Button Builder</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            padding-bottom: 32px;
            min-height: 100vh;
            touch-action: pan-x pan-y;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .subtitle {
            margin-bottom: 20px;
            color: var(--tg-theme-hint-color);
            font-size: 14px;
        }

        .row {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 14px;
            margin-bottom: 16px;
            padding: 12px;
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 0.5px solid var(--tg-theme-hint-color);
        }

        .row-title {
            font-weight: 500;
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }

        .delete-row-btn {
            background: transparent;
            color: var(--tg-theme-destructive-text-color);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            min-height: 60px;
        }

        .button-card {
            background: var(--tg-theme-bg-color);
            border-radius: 10px;
            padding: 10px;
            min-width: 130px;
            cursor: pointer;
            border: 0.5px solid var(--tg-theme-hint-color);
        }

        .button-label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .button-type {
            font-size: 11px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 4px;
        }

        .button-value {
            font-size: 10px;
            color: var(--tg-theme-hint-color);
            word-break: break-all;
        }

        .button-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .edit-btn, .delete-btn {
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            flex: 1;
        }

        .edit-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .delete-btn {
            background: var(--tg-theme-destructive-bg-color);
            color: var(--tg-theme-destructive-text-color);
        }

        .add-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .add-row-btn {
            background: transparent;
            border: 1px solid var(--tg-theme-button-color);
            color: var(--tg-theme-button-color);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0 16px;
        }

        .info-text {
            font-size: 12px;
            color: var(--tg-theme-hint-color);
            text-align: center;
            margin-top: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--tg-theme-bg-color);
            border-radius: 14px;
            padding: 20px;
            width: 90%;
            max-width: 320px;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 17px;
            font-weight: 600;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 0.5px solid var(--tg-theme-hint-color);
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 15px;
            -webkit-appearance: none;
            appearance: none;
        }

        .color-buttons {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .color-option {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .color-option.primary { background: #3390ec; color: white; }
        .color-option.success { background: #00b93e; color: white; }
        .color-option.danger { background: #e53935; color: white; }
        .color-option.none { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 200;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .toast.error {
            background: var(--tg-theme-destructive-bg-color);
            color: var(--tg-theme-destructive-text-color);
        }

        /* Disable all hover effects for touch devices */
        @media (hover: hover) {
            .delete-row-btn:hover,
            .edit-btn:hover,
            .delete-btn:hover,
            .add-btn:hover,
            .add-row-btn:hover,
            .color-option:hover,
            .modal-buttons button:hover {
                opacity: 1;
            }
        }

        /* Remove any hover opacity changes */
        .delete-row-btn,
        .edit-btn,
        .delete-btn,
        .add-btn,
        .add-row-btn,
        .color-option,
        .modal-buttons button {
            transition: none;
        }
    </style>
</head>
<body>
    <h1>Button Builder</h1>
    <div class="subtitle">Create buttons for your post</div>

    <div id="rows-container"></div>

    <button class="add-row-btn" onclick="addRow()">Add Row</button>

    <div class="info-text">Tap any button to edit</div>

    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="stopPropagation(event)">
            <h3>Edit Button</h3>
            <input type="text" id="btn-label" placeholder="Button label">
            <select id="btn-type">
                <option value="url">URL - Opens website</option>
                <option value="popup">Popup - Alert with OK</option>
                <option value="silent">Silent - Brief notification</option>
                <option value="share">Share - Share text to chat</option>
                <option value="copy">Copy - Copy to clipboard</option>
                <option value="webapp">WebApp - Opens web app</option>
                <option value="inline">Inline - Inline search</option>
            </select>
            <input type="text" id="btn-value" placeholder="Value (URL, text, etc.)">
            <div class="color-buttons">
                <button class="color-option primary" onclick="setColor('primary')">Primary</button>
                <button class="color-option success" onclick="setColor('success')">Success</button>
                <button class="color-option danger" onclick="setColor('danger')">Danger</button>
                <button class="color-option none" onclick="setColor('')">Default</button>
            </div>
            <div class="modal-buttons">
                <button onclick="saveButton()">Save</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.ready();

        function hapticLight() {
            tg.HapticFeedback.impactOccurred('light');
        }
        
        function hapticSuccess() {
            tg.HapticFeedback.notificationOccurred('success');
        }

        function showToast(message, isError = false) {
            let toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
            if (isError) {
                tg.HapticFeedback.notificationOccurred('error');
            } else {
                hapticSuccess();
            }
        }

        async function saveToCloud() {
            try {
                await tg.CloudStorage.setItem('button_rows', JSON.stringify(rows));
            } catch(e) {}
        }
        
        async function loadFromCloud() {
            try {
                let saved = await tg.CloudStorage.getItem('button_rows');
                if (saved) return JSON.parse(saved);
            } catch(e) {
                let saved = localStorage.getItem('button_rows');
                if (saved) return JSON.parse(saved);
            }
            return null;
        }

        tg.MainButton.setText("Send to Bot");
        tg.MainButton.onClick(() => {
            hapticLight();
            sendToBot();
        });
        tg.MainButton.show();

        tg.BackButton.onClick(() => {
            hapticLight();
            if (document.getElementById('modal').style.display === 'flex') {
                closeModal();
            }
        });

        let rows = [];
        let editRowIndex = null;
        let editBtnIndex = null;

        async function saveToStorage() {
            await saveToCloud();
            localStorage.setItem('button_rows', JSON.stringify(rows));
        }

        async function loadFromStorage() {
            let saved = await loadFromCloud();
            if (!saved || saved.length === 0) {
                saved = localStorage.getItem('button_rows');
                if (saved) saved = JSON.parse(saved);
            }
            if (saved && saved.length > 0) {
                rows = saved;
            } else {
                rows = [
                    [{ label: "Subscribe", type: "url", value: "https://t.me/yourchannel", color: "primary" }],
                    [{ label: "Share", type: "share", value: "Check out this channel!", color: "success" }]
                ];
            }
            render();
        }

        function escapeHtml(text) {
            if (!text) return '';
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getTypeLabel(type) {
            let labels = {
                'url': 'URL', 'popup': 'Popup', 'silent': 'Silent', 
                'share': 'Share', 'copy': 'Copy', 'webapp': 'WebApp', 'inline': 'Inline'
            };
            return labels[type] || type;
        }

        function render() {
            let container = document.getElementById('rows-container');
            if (!container) return;
            
            if (rows.length === 0) {
                container.innerHTML = '<div class="empty-state">No buttons yet<br>Click "Add Row" to start</div>';
                return;
            }

            container.innerHTML = '';
            
            for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
                let row = rows[rowIndex];
                let rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.innerHTML = `
                    <div class="row-header">
                        <span class="row-title">Row ${rowIndex + 1}</span>
                        <button class="delete-row-btn" onclick="deleteRow(${rowIndex})">Delete Row</button>
                    </div>
                    <div class="buttons-container" id="buttons-container-${rowIndex}"></div>
                    <button class="add-btn" onclick="addButton(${rowIndex})">Add Button to Row ${rowIndex + 1}</button>
                `;
                
                let buttonsContainer = rowDiv.querySelector(`#buttons-container-${rowIndex}`);
                
                for (let btnIndex = 0; btnIndex < row.length; btnIndex++) {
                    let button = row[btnIndex];
                    let btnCard = document.createElement('div');
                    btnCard.className = 'button-card';
                    btnCard.onclick = (function(r, b) {
                        return function() { openModal(r, b); };
                    })(rowIndex, btnIndex);
                    
                    btnCard.innerHTML = `
                        <div class="button-label">${escapeHtml(button.label)}</div>
                        <div class="button-type">${getTypeLabel(button.type)}</div>
                        <div class="button-value">${escapeHtml(button.value.substring(0, 40))}${button.value.length > 40 ? '...' : ''}</div>
                        <div class="button-actions">
                            <button class="edit-btn" onclick="event.stopPropagation(); openModal(${rowIndex}, ${btnIndex})">Edit</button>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteButton(${rowIndex}, ${btnIndex})">Delete</button>
                        </div>
                    `;
                    buttonsContainer.appendChild(btnCard);
                }
                container.appendChild(rowDiv);
            }
            saveToStorage();
        }

        function addRow() {
            hapticLight();
            rows.push([]);
            render();
            showToast("Row added");
        }

        function deleteRow(rowIndex) {
            hapticLight();
            tg.showConfirm(`Delete Row ${rowIndex + 1}?`, (confirmed) => {
                if (confirmed) {
                    rows.splice(rowIndex, 1);
                    render();
                    showToast("Row deleted");
                }
            });
        }

        function addButton(rowIndex) {
            hapticLight();
            rows[rowIndex].push({
                label: "New Button",
                type: "url",
                value: "https://",
                color: "primary"
            });
            render();
            showToast("Button added");
        }

        function deleteButton(rowIndex, btnIndex) {
            hapticLight();
            tg.showConfirm(`Delete this button?`, (confirmed) => {
                if (confirmed) {
                    rows[rowIndex].splice(btnIndex, 1);
                    if (rows[rowIndex].length === 0) {
                        rows.splice(rowIndex, 1);
                    }
                    render();
                    showToast("Button deleted");
                }
            });
        }

        function openModal(rowIndex, btnIndex) {
            hapticLight();
            editRowIndex = rowIndex;
            editBtnIndex = btnIndex;
            tg.BackButton.show();
            
            let button = rows[rowIndex][btnIndex];
            document.getElementById('btn-label').value = button.label || '';
            document.getElementById('btn-type').value = button.type || 'url';
            document.getElementById('btn-value').value = button.value || '';
            document.getElementById('modal').style.display = 'flex';
        }

        function setColor(color) {
            hapticLight();
            if (editRowIndex !== null && editBtnIndex !== null) {
                rows[editRowIndex][editBtnIndex].color = color;
                render();
            }
        }

        function saveButton() {
            if (editRowIndex !== null && editBtnIndex !== null) {
                let button = rows[editRowIndex][editBtnIndex];
                button.label = document.getElementById('btn-label').value || "Button";
                button.type = document.getElementById('btn-type').value;
                button.value = document.getElementById('btn-value').value || "";
                render();
                showToast("Button saved");
                hapticSuccess();
            }
            closeModal();
        }

        function closeModal(event) {
            document.getElementById('modal').style.display = 'none';
            editRowIndex = null;
            editBtnIndex = null;
            tg.BackButton.hide();
        }

        function stopPropagation(event) {
            if (event) event.stopPropagation();
        }

        function sendToBot() {
            if (rows.length === 0) {
                tg.showAlert("Please add at least one button!");
                return;
            }
            
            tg.MainButton.showProgress(false);
            
            let buttonsText = [];
            for (let i = 0; i < rows.length; i++) {
                let rowButtons = [];
                for (let j = 0; j < rows[i].length; j++) {
                    let btn = rows[i][j];
                    let btnText = `${btn.label} | ${btn.type} | ${btn.value}`;
                    if (btn.color && btn.color !== '') {
                        btnText += ` | ${btn.color}`;
                    }
                    rowButtons.push(btnText);
                }
                buttonsText.push(rowButtons.join(' + '));
            }
            
            try {
                tg.sendData(buttonsText.join('\n'));
                showToast("Sent to bot!");
                setTimeout(() => tg.close(), 500);
            } catch(e) {
                tg.MainButton.hideProgress();
                tg.showAlert("Error: " + e.message);
                showToast("Error sending", true);
            }
        }

        loadFromStorage();
        setTimeout(() => showToast("Button Builder ready"), 500);
    </script>
</body>
</html>
