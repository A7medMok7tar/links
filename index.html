<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Button Builder</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            padding-bottom: 32px;
            min-height: 100vh;
            touch-action: pan-x pan-y;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .subtitle {
            margin-bottom: 20px;
            color: var(--tg-theme-hint-color);
            font-size: 14px;
        }

        /* Row styles */
        .row {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 14px;
            margin-bottom: 16px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s ease;
        }

        .row.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .row.drag-over {
            border: 2px solid var(--tg-theme-button-color);
            background: var(--tg-theme-bg-color);
        }

        .drag-handle {
            cursor: grab;
            padding: 4px 8px;
            margin-right: 8px;
            color: var(--tg-theme-hint-color);
            font-size: 16px;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 0.5px solid var(--tg-theme-hint-color);
        }

        .row-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row-title {
            font-weight: 500;
            font-size: 14px;
            color: var(--tg-theme-hint-color);
        }

        .delete-row-btn {
            background: transparent;
            color: var(--tg-theme-destructive-text-color);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            min-height: 60px;
        }

        .button-card {
            background: var(--tg-theme-bg-color);
            border-radius: 10px;
            padding: 10px;
            min-width: 130px;
            cursor: pointer;
            border: 0.5px solid var(--tg-theme-hint-color);
            position: relative;
        }

        .button-card.dragging {
            opacity: 0.5;
        }

        .button-card.has-error {
            border: 1.5px solid var(--tg-theme-destructive-bg-color);
            background: rgba(229, 57, 53, 0.1);
        }

        .error-marker {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--tg-theme-destructive-bg-color);
            color: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
        }

        .button-label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .button-type {
            font-size: 11px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 4px;
        }

        .button-value {
            font-size: 10px;
            color: var(--tg-theme-hint-color);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .button-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .edit-btn, .delete-btn, .duplicate-btn {
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            flex: 1;
        }

        .edit-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
        }

        .delete-btn {
            background: var(--tg-theme-destructive-bg-color);
            color: var(--tg-theme-destructive-text-color);
        }

        .duplicate-btn {
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            border: 0.5px solid var(--tg-theme-hint-color);
        }

        .add-btn {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .add-row-btn {
            background: transparent;
            border: 1px solid var(--tg-theme-button-color);
            color: var(--tg-theme-button-color);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0 16px;
        }

        .info-text {
            font-size: 12px;
            color: var(--tg-theme-hint-color);
            text-align: center;
            margin-top: 16px;
        }

        .validation-summary {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 10px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 12px;
            display: none;
        }

        .validation-summary.error {
            color: var(--tg-theme-destructive-text-color);
            border-left: 3px solid var(--tg-theme-destructive-bg-color);
        }

        /* Chips styles */
        .chips-container {
            margin: 12px 0;
        }

        .chips-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 8px;
        }

        .chips-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 8px 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .chip {
            background: var(--tg-theme-secondary-bg-color);
            border: 0.5px solid var(--tg-theme-hint-color);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chip:active {
            transform: scale(0.96);
        }

        .chip.active {
            background: var(--tg-theme-button-color);
            border-color: transparent;
            color: var(--tg-theme-button-text-color);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--tg-theme-bg-color);
            border-radius: 14px;
            padding: 20px;
            width: 90%;
            max-width: 340px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            font-size: 17px;
            font-weight: 600;
        }

        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 0.5px solid var(--tg-theme-hint-color);
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
            font-size: 15px;
            -webkit-appearance: none;
            appearance: none;
            font-family: inherit;
        }

        .modal-content textarea {
            resize: vertical;
            min-height: 80px;
            font-family: monospace;
            line-height: 1.4;
        }

        .char-counter {
            font-size: 11px;
            text-align: right;
            margin-top: -4px;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color);
        }

        .char-counter.warning {
            color: #ffaa00;
        }

        .char-counter.danger {
            color: var(--tg-theme-destructive-text-color);
        }

        .validation-message {
            font-size: 11px;
            color: var(--tg-theme-destructive-text-color);
            margin-top: -4px;
            margin-bottom: 8px;
            display: none;
        }

        .validation-message.show {
            display: block;
        }

        .color-buttons {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .color-option {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .color-option.primary { background: #3390ec; color: white; }
        .color-option.success { background: #00b93e; color: white; }
        .color-option.danger { background: #e53935; color: white; }
        .color-option.none { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 200;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .toast.error {
            background: var(--tg-theme-destructive-bg-color);
            color: var(--tg-theme-destructive-text-color);
        }
    </style>
</head>
<body>
    <h1>Button Builder</h1>
    <div class="subtitle">Create buttons for your post</div>

    <div id="validation-summary" class="validation-summary"></div>

    <div id="rows-container"></div>

    <button class="add-row-btn" onclick="addRow()">Add Row</button>

    <div class="info-text">Tap any button to edit • Drag ⋮⋮ to reorder rows • Drag buttons to reorder</div>

    <!-- Modal for editing button -->
    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="stopPropagation(event)">
            <h3>Edit Button</h3>
            
            <input type="text" id="btn-label" placeholder="Button label" oninput="validateCurrentButton()">
            <div id="label-validation" class="validation-message"></div>
            
            <!-- Horizontal Chips for Type Selection -->
            <div class="chips-container">
                <div class="chips-label">Button Type</div>
                <div class="chips-scroll" id="chips-scroll">
                    <div class="chip active" data-type="url" onclick="selectChip('url')">
                        <span>🔗</span> URL
                    </div>
                    <div class="chip" data-type="popup" onclick="selectChip('popup')">
                        <span>⚠️</span> Popup
                    </div>
                    <div class="chip" data-type="silent" onclick="selectChip('silent')">
                        <span>🔔</span> Silent
                    </div>
                    <div class="chip" data-type="share" onclick="selectChip('share')">
                        <span>📤</span> Share
                    </div>
                    <div class="chip" data-type="copy" onclick="selectChip('copy')">
                        <span>📋</span> Copy
                    </div>
                    <div class="chip" data-type="webapp" onclick="selectChip('webapp')">
                        <span>🖥️</span> WebApp
                    </div>
                </div>
            </div>
            
            <!-- Dynamic input field (can be input or textarea) -->
            <div id="value-input-container"></div>
            <div id="char-counter" class="char-counter"></div>
            <div id="value-validation" class="validation-message"></div>
            
            <div class="color-buttons">
                <button class="color-option primary" onclick="setColor('primary')">Primary</button>
                <button class="color-option success" onclick="setColor('success')">Success</button>
                <button class="color-option danger" onclick="setColor('danger')">Danger</button>
                <button class="color-option none" onclick="setColor('')">Default</button>
            </div>
            
            <div class="modal-buttons">
                <button onclick="saveButton()">Save</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.ready();

        // Type configuration
        const typeIcons = {
            'url': '🔗',
            'popup': '⚠️',
            'silent': '🔔',
            'share': '📤',
            'copy': '📋',
            'webapp': '🖥️'
        };

        const typeNames = {
            'url': 'URL',
            'popup': 'Popup',
            'silent': 'Silent',
            'share': 'Share',
            'copy': 'Copy',
            'webapp': 'WebApp'
        };

        // Types that need multi-line input
        const multiLineTypes = ['popup', 'silent', 'share', 'copy'];
        
        // Max character limits
        const maxChars = {
            'popup': 200,
            'silent': 200,
            'share': 200,
            'copy': 200,
            'url': null,
            'webapp': null
        };

        let currentType = 'url';
        let currentValue = '';
        let rows = [];
        let editRowIndex = null;
        let editBtnIndex = null;

        // Haptic feedback
        function hapticLight() {
            tg.HapticFeedback.impactOccurred('light');
        }
        
        function hapticSuccess() {
            tg.HapticFeedback.notificationOccurred('success');
        }

        function hapticWarning() {
            tg.HapticFeedback.notificationOccurred('warning');
        }

        function showToast(message, isError = false) {
            let toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
            if (isError) {
                tg.HapticFeedback.notificationOccurred('error');
            } else {
                hapticSuccess();
            }
        }

        // Cloud storage
        async function saveToCloud() {
            try {
                await tg.CloudStorage.setItem('button_rows', JSON.stringify(rows));
            } catch(e) {}
        }
        
        async function loadFromCloud() {
            try {
                let saved = await tg.CloudStorage.getItem('button_rows');
                if (saved) return JSON.parse(saved);
            } catch(e) {
                let saved = localStorage.getItem('button_rows');
                if (saved) return JSON.parse(saved);
            }
            return null;
        }

        // Main Button
        tg.MainButton.setText("Send to Bot");
        tg.MainButton.onClick(() => {
            hapticLight();
            if (validateAllButtons()) {
                sendToBot();
            } else {
                showToast("Fix validation errors before sending", true);
                hapticWarning();
            }
        });
        tg.MainButton.show();

        tg.BackButton.onClick(() => {
            hapticLight();
            if (document.getElementById('modal').style.display === 'flex') {
                closeModal();
            }
        });

        // Dynamic value input field based on type
        function updateValueInputField() {
            const container = document.getElementById('value-input-container');
            const isMultiLine = multiLineTypes.includes(currentType);
            const maxChar = maxChars[currentType];
            const currentValueField = currentValue || '';
            
            if (isMultiLine) {
                container.innerHTML = `
                    <textarea id="btn-value" placeholder="Enter message (max ${maxChar} characters)" rows="4">${escapeHtml(currentValueField)}</textarea>
                `;
                const textarea = document.getElementById('btn-value');
                if (textarea) {
                    textarea.oninput = function() {
                        currentValue = this.value;
                        updateCharCounter();
                        validateCurrentButton();
                    };
                }
            } else {
                container.innerHTML = `
                    <input type="text" id="btn-value" placeholder="Enter URL" value="${escapeHtml(currentValueField)}">
                `;
                const input = document.getElementById('btn-value');
                if (input) {
                    input.oninput = function() {
                        currentValue = this.value;
                        validateCurrentButton();
                    };
                }
            }
            
            updateCharCounter();
        }
        
        function updateCharCounter() {
            const counterDiv = document.getElementById('char-counter');
            const maxChar = maxChars[currentType];
            
            if (maxChar && multiLineTypes.includes(currentType)) {
                const length = currentValue.length;
                const remaining = maxChar - length;
                
                counterDiv.style.display = 'block';
                if (remaining < 0) {
                    counterDiv.className = 'char-counter danger';
                    counterDiv.innerHTML = `⚠️ ${Math.abs(remaining)} characters over limit (${length}/${maxChar})`;
                } else if (remaining < 20) {
                    counterDiv.className = 'char-counter warning';
                    counterDiv.innerHTML = `📝 ${remaining} characters remaining (${length}/${maxChar})`;
                } else {
                    counterDiv.className = 'char-counter';
                    counterDiv.innerHTML = `📝 ${length}/${maxChar} characters`;
                }
            } else {
                counterDiv.style.display = 'none';
            }
        }

        // Chip selection
        function selectChip(type) {
            hapticLight();
            currentType = type;
            
            // Update active state on chips
            document.querySelectorAll('.chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.getAttribute('data-type') === type) {
                    chip.classList.add('active');
                }
            });
            
            // Update input field type
            updateValueInputField();
            validateCurrentButton();
        }

        // Drag & Drop functions
        let draggedRowIndex = null;
        let draggedButton = null;
        let draggedButtonRowIndex = null;
        let draggedButtonIndex = null;

        function handleRowDragStart(e, rowIndex) {
            draggedRowIndex = rowIndex;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleRowDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedRowIndex = null;
        }

        function handleRowDragOver(e, targetIndex) {
            e.preventDefault();
            if (draggedRowIndex === null) return;
            if (draggedRowIndex === targetIndex) return;
            
            let rows = document.querySelectorAll('.row');
            rows.forEach(row => row.classList.remove('drag-over'));
            e.target.closest('.row').classList.add('drag-over');
        }

        function handleRowDrop(e, targetIndex) {
            e.preventDefault();
            if (draggedRowIndex === null) return;
            if (draggedRowIndex === targetIndex) return;
            
            let rowsData = [...rows];
            let draggedItem = rowsData[draggedRowIndex];
            rowsData.splice(draggedRowIndex, 1);
            rowsData.splice(targetIndex, 0, draggedItem);
            rows = rowsData;
            
            render();
            showToast("Row moved");
            
            document.querySelectorAll('.row').forEach(row => row.classList.remove('drag-over'));
            draggedRowIndex = null;
        }

        function handleButtonDragStart(e, rowIndex, btnIndex) {
            draggedButton = rows[rowIndex][btnIndex];
            draggedButtonRowIndex = rowIndex;
            draggedButtonIndex = btnIndex;
            e.target.closest('.button-card').classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleButtonDragEnd(e) {
            if (e.target.closest('.button-card')) {
                e.target.closest('.button-card').classList.remove('dragging');
            }
            draggedButton = null;
            draggedButtonRowIndex = null;
            draggedButtonIndex = null;
        }

        function handleButtonDragOver(e, targetRowIndex, targetBtnIndex) {
            e.preventDefault();
            if (draggedButton === null) return;
        }

        function handleButtonDrop(e, targetRowIndex, targetBtnIndex) {
            e.preventDefault();
            if (draggedButton === null) return;
            
            let newRows = [...rows];
            
            newRows[draggedButtonRowIndex].splice(draggedButtonIndex, 1);
            
            let adjustedTargetIndex = targetBtnIndex;
            if (draggedButtonRowIndex === targetRowIndex && draggedButtonIndex < targetBtnIndex) {
                adjustedTargetIndex--;
            }
            
            newRows[targetRowIndex].splice(adjustedTargetIndex, 0, draggedButton);
            newRows = newRows.filter(row => row.length > 0);
            
            rows = newRows;
            render();
            showToast("Button moved");
            
            draggedButton = null;
            draggedButtonRowIndex = null;
            draggedButtonIndex = null;
        }

        // Validation functions
        function validateButton(button) {
            let errors = [];
            
            if (!button.label || button.label.trim() === '') {
                errors.push('Label is required');
            } else if (button.label.length > 50) {
                errors.push('Label is too long (max 50)');
            }
            
            if (!button.value || button.value.trim() === '') {
                errors.push(`${typeNames[button.type]} value is required`);
            } else if (multiLineTypes.includes(button.type)) {
                const max = maxChars[button.type];
                if (button.value.length > max) {
                    errors.push(`Text is too long (max ${max} characters, currently ${button.value.length})`);
                } else if (button.value.length === 0) {
                    errors.push(`Text cannot be empty`);
                }
            } else if (button.type === 'url' || button.type === 'webapp') {
                let urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
                if (!urlPattern.test(button.value)) {
                    errors.push('Invalid URL format');
                }
            }
            
            return errors;
        }

        function validateAllButtons() {
            let hasErrors = false;
            let totalErrors = 0;
            
            for (let i = 0; i < rows.length; i++) {
                for (let j = 0; j < rows[i].length; j++) {
                    let errors = validateButton(rows[i][j]);
                    if (errors.length > 0) {
                        hasErrors = true;
                        totalErrors += errors.length;
                    }
                }
            }
            
            let summaryDiv = document.getElementById('validation-summary');
            if (hasErrors) {
                summaryDiv.style.display = 'block';
                summaryDiv.className = 'validation-summary error';
                summaryDiv.innerHTML = `⚠️ ${totalErrors} validation issue${totalErrors > 1 ? 's' : ''} found. Fix before sending.`;
            } else {
                summaryDiv.style.display = 'none';
            }
            
            return !hasErrors;
        }

        function validateCurrentButton() {
            let label = document.getElementById('btn-label').value;
            let value = currentValue;
            
            let labelDiv = document.getElementById('label-validation');
            let valueDiv = document.getElementById('value-validation');
            
            let hasError = false;
            
            if (!label || label.trim() === '') {
                labelDiv.textContent = '❌ Label is required';
                labelDiv.classList.add('show');
                hasError = true;
            } else if (label.length > 50) {
                labelDiv.textContent = '❌ Label too long (max 50)';
                labelDiv.classList.add('show');
                hasError = true;
            } else {
                labelDiv.classList.remove('show');
            }
            
            if (!value || value.trim() === '') {
                valueDiv.textContent = `❌ ${typeNames[currentType]} value is required`;
                valueDiv.classList.add('show');
                hasError = true;
            } else if (multiLineTypes.includes(currentType)) {
                const max = maxChars[currentType];
                if (value.length > max) {
                    valueDiv.textContent = `❌ Text too long (max ${max} characters, currently ${value.length})`;
                    valueDiv.classList.add('show');
                    hasError = true;
                } else {
                    valueDiv.classList.remove('show');
                }
            } else if (currentType === 'url' || currentType === 'webapp') {
                let urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/;
                if (!urlPattern.test(value)) {
                    valueDiv.textContent = '❌ Invalid URL format (e.g., https://example.com)';
                    valueDiv.classList.add('show');
                    hasError = true;
                } else {
                    valueDiv.classList.remove('show');
                }
            } else {
                valueDiv.classList.remove('show');
            }
            
            return !hasError;
        }

        async function saveToStorage() {
            await saveToCloud();
            localStorage.setItem('button_rows', JSON.stringify(rows));
        }

        async function loadFromStorage() {
            let saved = await loadFromCloud();
            if (!saved || saved.length === 0) {
                saved = localStorage.getItem('button_rows');
                if (saved) saved = JSON.parse(saved);
            }
            if (saved && saved.length > 0) {
                rows = saved;
            } else {
                rows = [
                    [{ label: "Subscribe", type: "url", value: "https://t.me/yourchannel", color: "primary" }],
                    [{ label: "Share", type: "share", value: "Check out this channel!", color: "success" }]
                ];
            }
            render();
        }

        function escapeHtml(text) {
            if (!text) return '';
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getButtonValuePreview(value, type) {
            if (!value) return '';
            if (value.length > 40) {
                if (multiLineTypes.includes(type)) {
                    let lines = value.split('\n');
                    if (lines.length > 2) {
                        return lines[0].substring(0, 30) + '... +' + (lines.length - 1) + ' lines';
                    }
                }
                return value.substring(0, 40) + '...';
            }
            return value;
        }

        function render() {
            let container = document.getElementById('rows-container');
            if (!container) return;
            
            if (rows.length === 0) {
                container.innerHTML = '<div class="empty-state">No buttons yet<br>Click "Add Row" to start</div>';
                document.getElementById('validation-summary').style.display = 'none';
                return;
            }

            container.innerHTML = '';
            
            for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
                let row = rows[rowIndex];
                let rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                rowDiv.draggable = true;
                rowDiv.setAttribute('draggable', 'true');
                rowDiv.ondragstart = (e) => handleRowDragStart(e, rowIndex);
                rowDiv.ondragend = (e) => handleRowDragEnd(e);
                rowDiv.ondragover = (e) => handleRowDragOver(e, rowIndex);
                rowDiv.ondrop = (e) => handleRowDrop(e, rowIndex);
                
                rowDiv.innerHTML = `
                    <div class="row-header">
                        <div class="row-header-left">
                            <span class="drag-handle">⋮⋮</span>
                            <span class="row-title">Row ${rowIndex + 1}</span>
                        </div>
                        <button class="delete-row-btn" onclick="deleteRow(${rowIndex})">Delete Row</button>
                    </div>
                    <div class="buttons-container" id="buttons-container-${rowIndex}"></div>
                    <button class="add-btn" onclick="addButton(${rowIndex})">Add Button to Row ${rowIndex + 1}</button>
                `;
                
                let buttonsContainer = rowDiv.querySelector(`#buttons-container-${rowIndex}`);
                
                for (let btnIndex = 0; btnIndex < row.length; btnIndex++) {
                    let button = row[btnIndex];
                    let errors = validateButton(button);
                    let hasError = errors.length > 0;
                    
                    let btnCard = document.createElement('div');
                    btnCard.className = 'button-card' + (hasError ? ' has-error' : '');
                    btnCard.draggable = true;
                    btnCard.ondragstart = (e) => handleButtonDragStart(e, rowIndex, btnIndex);
                    btnCard.ondragend = (e) => handleButtonDragEnd(e);
                    btnCard.ondragover = (e) => handleButtonDragOver(e, rowIndex, btnIndex);
                    btnCard.ondrop = (e) => handleButtonDrop(e, rowIndex, btnIndex);
                    btnCard.onclick = (function(r, b) {
                        return function() { openModal(r, b); };
                    })(rowIndex, btnIndex);
                    
                    btnCard.innerHTML = `
                        ${hasError ? '<div class="error-marker">!</div>' : ''}
                        <div class="button-label">${escapeHtml(button.label)}</div>
                        <div class="button-type">${typeNames[button.type] || button.type}</div>
                        <div class="button-value">${escapeHtml(getButtonValuePreview(button.value, button.type))}</div>
                        <div class="button-actions">
                            <button class="edit-btn" onclick="event.stopPropagation(); openModal(${rowIndex}, ${btnIndex})">Edit</button>
                            <button class="duplicate-btn" onclick="event.stopPropagation(); duplicateButton(${rowIndex}, ${btnIndex})">Copy</button>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteButton(${rowIndex}, ${btnIndex})">Delete</button>
                        </div>
                    `;
                    
                    buttonsContainer.appendChild(btnCard);
                }
                container.appendChild(rowDiv);
            }
            
            validateAllButtons();
            saveToStorage();
        }

        function duplicateButton(rowIndex, btnIndex) {
            hapticLight();
            let button = JSON.parse(JSON.stringify(rows[rowIndex][btnIndex]));
            button.label = button.label + " (Copy)";
            rows[rowIndex].splice(btnIndex + 1, 0, button);
            render();
            showToast("Button duplicated");
        }

        function addRow() {
            hapticLight();
            rows.push([]);
            render();
            showToast("Row added");
        }

        function deleteRow(rowIndex) {
            hapticLight();
            if (tg.showConfirm) {
                tg.showConfirm(`Delete Row ${rowIndex + 1}?`, (confirmed) => {
                    if (confirmed) {
                        rows.splice(rowIndex, 1);
                        render();
                        showToast("Row deleted");
                    }
                });
            } else {
                if (confirm(`Delete Row ${rowIndex + 1}?`)) {
                    rows.splice(rowIndex, 1);
                    render();
                    showToast("Row deleted");
                }
            }
        }

        function addButton(rowIndex) {
            hapticLight();
            rows[rowIndex].push({
                label: "New Button",
                type: "url",
                value: "https://",
                color: "primary"
            });
            render();
            showToast("Button added");
        }

        function deleteButton(rowIndex, btnIndex) {
            hapticLight();
            if (tg.showConfirm) {
                tg.showConfirm(`Delete this button?`, (confirmed) => {
                    if (confirmed) {
                        rows[rowIndex].splice(btnIndex, 1);
                        if (rows[rowIndex].length === 0) {
                            rows.splice(rowIndex, 1);
                        }
                        render();
                        showToast("Button deleted");
                    }
                });
            } else {
                if (confirm(`Delete this button?`)) {
                    rows[rowIndex].splice(btnIndex, 1);
                    if (rows[rowIndex].length === 0) {
                        rows.splice(rowIndex, 1);
                    }
                    render();
                    showToast("Button deleted");
                }
            }
        }

        function openModal(rowIndex, btnIndex) {
            hapticLight();
            editRowIndex = rowIndex;
            editBtnIndex = btnIndex;
            let button = rows[rowIndex][btnIndex];
            currentType = button.type;
            currentValue = button.value || '';
            
            tg.BackButton.show();
            
            document.getElementById('btn-label').value = button.label || '';
            
            // Update active chip
            document.querySelectorAll('.chip').forEach(chip => {
                chip.classList.remove('active');
                if (chip.getAttribute('data-type') === button.type) {
                    chip.classList.add('active');
                }
            });
            
            // Update input field based on type
            updateValueInputField();
            
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => validateCurrentButton(), 50);
        }

        function setColor(color) {
            hapticLight();
            if (editRowIndex !== null && editBtnIndex !== null) {
                rows[editRowIndex][editBtnIndex].color = color;
                render();
            }
        }

        function saveButton() {
            if (validateCurrentButton()) {
                if (editRowIndex !== null && editBtnIndex !== null) {
                    let button = rows[editRowIndex][editBtnIndex];
                    button.label = document.getElementById('btn-label').value || "Button";
                    button.type = currentType;
                    button.value = currentValue;
                    render();
                    showToast("Button saved");
                    hapticSuccess();
                }
                closeModal();
            } else {
                hapticWarning();
                showToast("Please fix validation errors", true);
            }
        }

        function closeModal(event) {
            document.getElementById('modal').style.display = 'none';
            editRowIndex = null;
            editBtnIndex = null;
            currentType = 'url';
            currentValue = '';
            tg.BackButton.hide();
        }

        function stopPropagation(event) {
            if (event) event.stopPropagation();
        }

        function sendToBot() {
            if (rows.length === 0) {
                tg.showAlert("Please add at least one button!");
                return;
            }
            
            if (!validateAllButtons()) {
                tg.showAlert("Please fix validation errors before sending");
                return;
            }
            
            tg.MainButton.showProgress(false);
            
            let buttonsText = [];
            for (let i = 0; i < rows.length; i++) {
                let rowButtons = [];
                for (let j = 0; j < rows[i].length; j++) {
                    let btn = rows[i][j];
                    let btnText = `${btn.label} | ${btn.type} | ${btn.value}`;
                    if (btn.color && btn.color !== '') {
                        btnText += ` | ${btn.color}`;
                    }
                    rowButtons.push(btnText);
                }
                buttonsText.push(rowButtons.join(' + '));
            }
            
            try {
                tg.sendData(buttonsText.join('\n'));
                showToast("Sent to bot!");
                setTimeout(() => tg.close(), 500);
            } catch(e) {
                tg.MainButton.hideProgress();
                tg.showAlert("Error: " + e.message);
                showToast("Error sending", true);
            }
        }

        loadFromStorage();
        setTimeout(() => showToast("Button Builder ready"), 500);
    </script>
</body>
</html>
